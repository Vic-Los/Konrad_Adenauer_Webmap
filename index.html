        .play-control {
    background-color: white;
    width: 34px;
    height: 34px;
    line-height: 34px;
    text-align: center;
    cursor: pointer;
    font-weight: bold;
    font-size: 18px;
    border: 2px solid rgba(0,0,0,0.2);
    border-radius: 4px;
    display: block;
}
.play-control:hover { background-color: #f4f4f4; }

#year-display {
    position: absolute;
    bottom: 40px;
    left: 20px;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.9);
    padding: 20px 25px 15px 25px; /* Platz für den Balken oben */
    border-radius: 8px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 28px;
    font-weight: bold;
    color: #333;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    display: none;
    min-width: 180px;
    overflow: hidden; /* Damit der Balken nicht übersteht */
}

/* Der graue Hintergrund des Balkens */
#progress-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 5px; /* Von 600px auf 5px ändern! */
    background: #eee;
}

/* Der rote Ladebalken selbst */
#progress-bar {
    width: 0%;
    height: 5px;
    background: #dc3545; /* Köln-Rot */
    transition: width 0.1s linear; /* Sorgt für flüssige Bewegung */
}
/* ===== Header + Autoren (einfügen) ===== */

    box-sizing: border-box;
    width: 100%;
    height: 74px;
    padding: 14px 16px;

    border-bottom: 1px solid rgba(0,0,0,0.08);
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    z-index: 1000;

    position: fixed;
    top: 0;
    left: 0;
    right: 0;
}

#header h1 {
    margin: 0;
    font-size: 20px;
    line-height: 1.2;
    color: #111;
}

#authors {
    position: fixed;
    bottom: 8px;
    left: 10px;
    font-size: 12px;
    font-family: Arial, Helvetica, sans-serif;
    color: #333;
    background: rgba(255, 255, 255, 0.8);
    padding: 4px 8px;
    border-radius: 4px;
    z-index: 1100;
    pointer-events: none;
}

/* Map unter den Header schieben (wichtig!) */

        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

                    var newHeight = parseFloat(originalHeight) - 50;

                }

                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight()
            });

       $(document).ready(function() {
    // 1. Setup
    var years = ["Gesamtansicht", "1876", "1917", "1919", "1923", "1924", "1925", "1926", "1927", "1928", "1929", "1930", "1950"]; 
    var currentIndex = 0;
    var playInterval = null;

    // Das Anzeige-Element zum HTML hinzufügen
// Das Anzeige-Element inklusive Ladebalken zum HTML hinzufügen
$('body').append('<div id="year-display"><div id="progress-container"><div id="progress-bar"></div></div><span id="year-text"></span></div>');
    function updateMapData(selectedYear) {
    var yearNum = parseInt(selectedYear);
    $('#year-text').text(selectedYear); 

    // --- A: HINTERGRUNDKARTEN ---
    // Wir nehmen die 2023er Karte aus der Liste der zu löschenden Karten raus!
    var historicalLayers = [
        layer_1877PlanderStadtCoeln_6, layer_1918PlanderStadtClnSW_5, 
        layer_1921PlanderStadtKln_4, layer_1926PlanderStadtKln_3, 
        layer_1935Stadtkarte_2, layer_1945StadtKln_1
    ];
    
    // Alle alten historischen Karten entfernen
    historicalLayers.forEach(function(l) { if(map.hasLayer(l)) map.removeLayer(l); });

    // SICHERSTELLEN, dass die 2023er Karte IMMER da ist
    if(!map.hasLayer(layer_2023Stadtkarte_0)) {
        map.addLayer(layer_2023Stadtkarte_0);
    }

    // Jetzt die jeweilige historische Karte DRÜBER legen
    if (selectedYear !== "Gesamtansicht") {
        if (yearNum <= 1900) map.addLayer(layer_1877PlanderStadtCoeln_6);
        else if (yearNum >= 1917 && yearNum <= 1918) map.addLayer(layer_1918PlanderStadtClnSW_5);
        else if (yearNum >= 1919 && yearNum <= 1923) map.addLayer(layer_1921PlanderStadtKln_4);
        else if (yearNum >= 1924 && yearNum <= 1929) map.addLayer(layer_1926PlanderStadtKln_3);
        else if (yearNum == 1930) map.addLayer(layer_1935Stadtkarte_2);
        else if (yearNum == 1950) map.addLayer(layer_1945StadtKln_1);
    }
    
    // --- B: PUNKTE FILTERN ---
    // (Dieser Teil bleibt unverändert...)

        // --- B: PUNKTE FILTERN ---
        if (map.hasLayer(layer_Stationen_7)) map.removeLayer(layer_Stationen_7);
        layer_Stationen_7 = new L.geoJson(json_Stationen_7, {
            filter: function(feature) {
                if (selectedYear === "Gesamtansicht") return true;
                return feature.properties['Jahr'] == selectedYear;
            },
            style: style_Stationen_7_0,
            onEachFeature: function(feature, layer) {
                pop_Stationen_7(feature, layer);
                if (selectedYear !== "Gesamtansicht") {
                    setTimeout(function() { layer.openPopup(); }, 150);
                }
            }
        }).addTo(map);
    }

    // 2. Der Slider
    var timelineControl = L.control.timelineSlider({
        timelineItems: years,
        changeMap: function(e) {
            updateMapData(e.label);
            currentIndex = years.indexOf(e.label);
        }
    }).addTo(map);

    // 3. Play-Button
    var PlayButton = L.Control.extend({
        options: { position: 'topleft' },
        onAdd: function(map) {
            var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
            var button = L.DomUtil.create('a', 'play-control', container);
            button.innerHTML = '▶';
            button.style.cursor = 'pointer';
            button.style.backgroundColor = 'white';
            button.style.width = '30px';
            button.style.height = '30px';
            button.style.lineHeight = '30px';
            button.style.textAlign = 'center';
            button.style.display = 'block';

           L.DomEvent.on(button, 'click', function() {
    // 1. Wir wählen ALLE Leaflet-Steuerungen aus (Slider, Layer-Auswahl, Zoom)
    // Aber wir schließen den Play-Button aus, damit man ihn noch stoppen kann!
    var allControls = $('.leaflet-control').not($(container)); 
    
    // Falls der Slider eine ganz eigene Box hat, die nicht 'leaflet-control' heißt:
    var extraSlider = $('.timeline-container, .leaflet-control-timeline-slider');

    if (playInterval) {
        // --- STOP MODUS ---
        clearInterval(playInterval);
        playInterval = null;
        button.innerHTML = '▶';
        button.style.color = 'black';
        
        // Alles wieder einblenden
        allControls.fadeIn(400);
        extraSlider.fadeIn(400);
        $('#year-display').fadeOut(400);
    } else {
        // --- START MODUS ---
        button.innerHTML = '◼';
        button.style.color = 'red';
        
        allControls.fadeOut(400);
        extraSlider.fadeOut(400);
        $('#year-display').fadeIn(400);

        // Sofort das erste Jahr und die erste Animation starten
        $('#year-text').text(years[currentIndex]);
        $('#progress-bar').stop().css('width', '0%').animate({ width: '100%' }, 10000, 'linear');

        playInterval = setInterval(function() {
            currentIndex++;
            if (currentIndex >= years.length) currentIndex = 0;
            
            updateMapData(years[currentIndex]);

            // Balken für das nächste Jahr neu starten
            $('#progress-bar').stop().css('width', '0%').animate({ width: '100%' }, 10000, 'linear');
        }, 10000);

// WICHTIG: Beim ersten Start (direkt nach dem Klick) den Balken auch triggern:
$('#year-text').text(years[currentIndex]);
$('#progress-bar').stop().css('width', '0%').animate({ width: '100%' }, 3500, 'linear');
    }
});
            return container;
        }
    });
    map.addControl(new PlayButton());
});

        </script>        
    </body>
</html>
